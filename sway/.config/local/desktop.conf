# vars
set $alt_mod Mod1

# Autostart Apps
assign [app_id="ghostty"] workspace number 1

assign [app_id="Alacritty"] workspace number 11
assign [app_id="google-chrome"] workspace number 12
assign [class="steam"] workspace number 13
# assign [class="discord"] workspace number 14

# binds
# left monitor

bindsym $alt_mod+1 workspace number 11
bindsym $alt_mod+2 workspace number 12
bindsym $alt_mod+3 workspace number 13
bindsym $alt_mod+4 workspace number 14
bindsym $alt_mod+5 workspace number 15
bindsym $alt_mod+6 workspace number 16
bindsym $alt_mod+7 workspace number 17
bindsym $alt_mod+8 workspace number 18
bindsym $alt_mod+9 workspace number 19
bindsym $alt_mod+0 workspace number 20

bindsym $alt_mod+Shift+1 move container to workspace number 11
bindsym $alt_mod+Shift+2 move container to workspace number 12
bindsym $alt_mod+Shift+3 move container to workspace number 13
bindsym $alt_mod+Shift+4 move container to workspace number 14
bindsym $alt_mod+Shift+5 move container to workspace number 15
bindsym $alt_mod+Shift+6 move container to workspace number 16
bindsym $alt_mod+Shift+7 move container to workspace number 17
bindsym $alt_mod+Shift+8 move container to workspace number 18
bindsym $alt_mod+Shift+9 move container to workspace number 19
bindsym $alt_mod+Shift+0 move container to workspace number 20

# monitors
# ViewSocic

output DP-3 resolution 1920x1080@75Hz position 0,0 scale 1.2
workspace 1 output DP-3
workspace 2 output DP-3
workspace 3 output DP-3
workspace 4 output DP-3
workspace 5 output DP-3
workspace 6 output DP-3
workspace 7 output DP-3
workspace 8 output DP-3
workspace 9 output DP-3
workspace 10 output DP-3

# ASUS

output DP-2 resolution 1920x1080@75Hz position 1600,0  scale 1.2
workspace 11 output DP-2
workspace 12 output DP-2
workspace 13 output DP-2
workspace 14 output DP-2
workspace 15 output DP-2
workspace 16 output DP-2
workspace 17 output DP-2
workspace 18 output DP-2
workspace 19 output DP-2
workspace 20 output DP-2
